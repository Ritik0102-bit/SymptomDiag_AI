<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Symptom Checker | INT 428</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                <div class="bot-avatar">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
                <div class="header-info">
                    <h2>MediBot AI</h2>
                    <p>Clinical Symptom Analyzer</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" title="Toggle Dark Mode"><i class="fa-solid fa-moon"></i></button>
                <button id="export-chat" title="Download Consultation"><i class="fa-solid fa-download"></i></button>
                <button id="clear-chat" title="Clear Chat"><i class="fa-solid fa-trash-can"></i></button>
            </div>
        </div>

        <div class="medical-disclaimer">
            <i class="fa-solid fa-triangle-exclamation"></i> 
            <span><b>Notice:</b> AI generated analysis. Consult a physician for medical advice.</span>
        </div>

        <div class="chat-box" id="chat-box">
            </div>

        <div class="quick-replies" id="quick-replies">
            <button class="pill-btn" onclick="sendQuickReply('I have a severe headache and fever')"><i class="fa-solid fa-head-side-virus"></i> Headache & Fever</button>
            <button class="pill-btn" onclick="sendQuickReply('My stomach hurts and I feel nauseous')"><i class="fa-solid fa-virus-covid"></i> Stomach Pain</button>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Describe your symptoms..." autocomplete="off">
            <button id="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
