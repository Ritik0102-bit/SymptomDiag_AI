<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Symptom Checker | INT 428</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="bot-avatar">🤖</div>
            <div class="header-info">
                <h2>MediBot AI</h2>
                <p>Symptom Checker (Project INT 428)</p>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            </div>

        <div class="quick-replies" id="quick-replies">
            <button class="pill-btn" onclick="sendQuickReply('I have a headache and fever')">Headache & Fever</button>
            <button class="pill-btn" onclick="sendQuickReply('My stomach hurts and I feel nauseous')">Stomach Pain</button>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your symptoms here..." autocomplete="off">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
